{% set version = "1.17" %}

package:
  name: python-rapidjson
  version: {{ version }}

source:
  - url: https://github.com/python-rapidjson/python-rapidjson/archive/refs/tags/v{{ version }}.tar.gz
    sha256: ab836acaef05880fd4005eff7bdaa6d672262b0e2c797828eab23ec31f904f38
  - url: https://github.com/Tencent/rapidjson/archive/ab1842a2dae061284c0a62dca1cc6d5e7e37e346.tar.gz
    sha256: 39f96f17b40f7201042c9b45d6444cb7eae1b7adfb7455412a86f6140450d32d
    folder: rapidjson

build:
  number: 0

requirements:
  build:
    - {{ compiler('cxx') }}
  host:
    - python
    - pip
    - setuptools
  run:
    - python

test:
  imports:
    - rapidjson
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/python-rapidjson/python-rapidjson
  license: MIT
